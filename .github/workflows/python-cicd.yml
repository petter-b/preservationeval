name: Python Package CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize, labeled]
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: false
        default: 'none'
        type: choice
        options:
        - none
        - release-candidate
        - release-patch
        - release-minor
        - release-major

jobs:
  test:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        python-version: ["3.13", "3.12", "3.11"]

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: Set up uv
      uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
      with:
        version: "0.10.x"
        enable-cache: true

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Set up Node.js
      uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
      with:
        node-version: '22'

    - name: Install package and dependencies
      # --python overrides .python-version (which pins 3.13 for local dev)
      # Only install lint extras on 3.13 where pre-commit runs
      run: |
        if [[ "${{ matrix.python-version }}" == "3.13" ]]; then
          uv sync --frozen --extra test --extra lint --python ${{ matrix.python-version }}
        else
          uv sync --frozen --extra test --python ${{ matrix.python-version }}
        fi

    - name: Cache pre-commit hooks
      if: matrix.python-version == '3.13'
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
      with:
        path: ~/.cache/pre-commit
        key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

    - name: Run pre-commit
      if: matrix.python-version == '3.13'
      env:
        SKIP: no-commit-to-branch
      run: uv run --python ${{ matrix.python-version }} pre-commit run --all-files

    - name: Run tests
      run: uv run --python ${{ matrix.python-version }} pytest --cov

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  release:
    runs-on: ubuntu-latest
    environment: production
    needs: test
    if: |
      contains(github.event.label.name, 'release-candidate') ||
      contains(github.event.label.name, 'release-patch') ||
      contains(github.event.label.name, 'release-minor') ||
      contains(github.event.label.name, 'release-major') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.release_type != 'none')

    permissions:
      contents: write
      pull-requests: write

    env:
      GITHUB_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Set up uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          version: "0.10.x"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Set up Node.js  # for semver
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: '22'

      - name: Install build dependencies
        run: uv sync --frozen --extra test --extra release

      - name: Determine release type
        id: release_type
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TYPE: ${{ github.event.inputs.release_type }}
          LABEL_NAME: ${{ github.event.label.name }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            RELEASE_TYPE="$INPUT_TYPE"
          else
            RELEASE_TYPE="$LABEL_NAME"
          fi
          echo "release_type=$RELEASE_TYPE" >> $GITHUB_OUTPUT
          echo "Detected release type: $RELEASE_TYPE"

      - name: Validate before release
        run: |
          if ! command -v npx &> /dev/null; then
            echo "Error: npx command not found"
            exit 1
          fi
          # Get the latest tag (vX.Y.Z), strip 'v' for numeric semver checks
          LATEST_TAG=$(git describe --tags --abbrev=0 --match="v*" 2>/dev/null || echo "")
          if [[ -n "$LATEST_TAG" ]]; then
            CURRENT_VERSION=$(echo "$LATEST_TAG" | sed 's/^v//')
          else
            CURRENT_VERSION="0.0.0"
            echo "No existing tags found, using initial version: $CURRENT_VERSION"
          fi
          # Validate version looks like X.Y.Z
          if [[ ! "$CURRENT_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Invalid version format: $CURRENT_VERSION"
            exit 1
          fi
          echo "Validation passed. Current version: $CURRENT_VERSION"

      - name: Validate CHANGELOG.md
        if: steps.release_type.outputs.release_type == 'release-patch' || steps.release_type.outputs.release_type == 'release-minor' || steps.release_type.outputs.release_type == 'release-major'
        run: |
          if ! grep -q '## \[Unreleased\]' CHANGELOG.md; then
            echo "::error::CHANGELOG.md is missing an [Unreleased] section"
            exit 1
          fi
          # Extract lines between [Unreleased] and the next ## heading
          CONTENT=$(sed -n '/^## \[Unreleased\]/,/^## \[/{/^## \[/!p}' CHANGELOG.md | grep -c '^\s*- ' || true)
          if [[ "$CONTENT" -eq 0 ]]; then
            echo "::error::CHANGELOG.md [Unreleased] section has no entries. Document your changes before releasing."
            exit 1
          fi
          echo "✅ CHANGELOG.md has $CONTENT unreleased entries"

      # =========================
      # Release Candidate (TestPyPI)
      # =========================
      - name: Build and (optionally) Publish Release Candidate
        id: build_rc
        if: steps.release_type.outputs.release_type == 'release-candidate'
        env:
          TEST_PYPI_TOKEN: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: |
          # Get the base version from the latest tag and strip leading 'v'
          LATEST_TAG=$(git describe --tags --abbrev=0 --match="v*" 2>/dev/null || echo "")
          if [[ -n "$LATEST_TAG" ]]; then
            BASE_VERSION=$(echo "$LATEST_TAG" | sed 's/^v//')
          else
            BASE_VERSION="0.0.0"
          fi
          # Create a pre-release version, e.g., 1.2.3rc45 (PEP 440)
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            RC_NUMBER=$(date +%s)
            RC_VERSION="${BASE_VERSION}rc${RC_NUMBER}"
          else
            PR_NUMBER=${{ github.event.pull_request.number }}
            RC_VERSION="${BASE_VERSION}rc${PR_NUMBER}"
          fi
          echo "Building Release Candidate version: ${RC_VERSION}"

          rm -rf dist/
          # hatch-vcs delegates to setuptools-scm internally, which reads
          # SETUPTOOLS_SCM_PRETEND_VERSION to override the detected version.
          # This is documented by hatch-vcs but couples us to the setuptools-scm
          # backend — if hatch-vcs changes its versioning backend, this will break.
          SETUPTOOLS_SCM_PRETEND_VERSION="${RC_VERSION}" uv build --sdist

          # Verify the pretend version actually made it into the sdist metadata
          tar -xOf dist/*.tar.gz '*/PKG-INFO' | grep "^Version: ${RC_VERSION}$"

          # IP protection: verify no tables.py in sdist, no wheel built
          ! tar -tvf dist/*.tar.gz | grep '/tables\.py$'
          test $(ls dist/*.whl 2>/dev/null | wc -l) -eq 0

          # Validate sdist metadata before upload
          uv run twine check dist/*

          if [[ -n "$TEST_PYPI_TOKEN" ]]; then
            UV_PUBLISH_TOKEN="$TEST_PYPI_TOKEN" uv publish dist/*.tar.gz --publish-url https://test.pypi.org/legacy/
            echo "✅ RC ${RC_VERSION} uploaded to TestPyPI"
          else
            echo "TEST_PYPI_API_TOKEN not set; skipping TestPyPI upload"
          fi

          echo "rc_version=${RC_VERSION}" >> $GITHUB_OUTPUT

      # =========================
      # Production Release (PyPI)
      # =========================
      - name: Build, Publish Production Release to PyPI, and Create GH Release
        id: build_prod
        if: steps.release_type.outputs.release_type == 'release-patch' || steps.release_type.outputs.release_type == 'release-minor' || steps.release_type.outputs.release_type == 'release-major'
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          LATEST_TAG=$(git describe --tags --abbrev=0 --match="v*" 2>/dev/null || echo "")
          if [[ -n "$LATEST_TAG" ]]; then
            CURRENT_VERSION=$(echo "$LATEST_TAG" | sed 's/^v//')
          else
            CURRENT_VERSION="0.0.0"
          fi

          if [[ -z "$LATEST_TAG" ]]; then
            echo "🎉 First release detected"
            if [[ "${{ steps.release_type.outputs.release_type }}" == "release-minor" ]]; then
              NEW_VERSION="0.1.0"
            elif [[ "${{ steps.release_type.outputs.release_type }}" == "release-major" ]]; then
              NEW_VERSION="1.0.0"
            else
              NEW_VERSION="0.0.1"
            fi
          else
            echo "📈 Bumping existing version: $CURRENT_VERSION"
            if [[ "${{ steps.release_type.outputs.release_type }}" == "release-patch" ]]; then
              NEW_VERSION=$(npx semver -i patch $CURRENT_VERSION)
            elif [[ "${{ steps.release_type.outputs.release_type }}" == "release-minor" ]]; then
              NEW_VERSION=$(npx semver -i minor $CURRENT_VERSION)
            elif [[ "${{ steps.release_type.outputs.release_type }}" == "release-major" ]]; then
              NEW_VERSION=$(npx semver -i major $CURRENT_VERSION)
            fi
          fi

          echo "Version: ${CURRENT_VERSION} → ${NEW_VERSION}"

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git checkout ${{ github.head_ref }}
            # Stamp CHANGELOG: [Unreleased] → [X.Y.Z] - date
            RELEASE_DATE=$(date -u +%Y-%m-%d)
            sed -i "s/^## \[Unreleased\]$/## [Unreleased]\n\n## [${NEW_VERSION}] - ${RELEASE_DATE}/" CHANGELOG.md
            if ! grep -q "^## \[${NEW_VERSION}\] - ${RELEASE_DATE}$" CHANGELOG.md; then
              echo "::error::CHANGELOG.md transform failed"
              exit 1
            fi
            echo "📝 CHANGELOG.md: [Unreleased] → [${NEW_VERSION}] - ${RELEASE_DATE}"
            git add .
            git commit -m "chore: Prepare for release ${NEW_VERSION}" || echo "No changes to commit"
            git push origin ${{ github.head_ref }}
            echo "Attempting to merge PR..."
            if ! gh pr merge ${{ github.event.pull_request.number }} --squash --delete-branch; then
              echo "❌ Auto-merge failed. Please merge manually and re-run."
              exit 1
            fi
            git checkout main
            git pull origin main
          else
            # Dispatch flow: stamp CHANGELOG and commit to main
            RELEASE_DATE=$(date -u +%Y-%m-%d)
            sed -i "s/^## \[Unreleased\]$/## [Unreleased]\n\n## [${NEW_VERSION}] - ${RELEASE_DATE}/" CHANGELOG.md
            if ! grep -q "^## \[${NEW_VERSION}\] - ${RELEASE_DATE}$" CHANGELOG.md; then
              echo "::error::CHANGELOG.md transform failed"
              exit 1
            fi
            echo "📝 CHANGELOG.md: [Unreleased] → [${NEW_VERSION}] - ${RELEASE_DATE}"
            git add CHANGELOG.md
            git commit -m "chore: prepare changelog for release ${NEW_VERSION}"
            # Use RELEASE_PAT if available (branch protection may block github.token)
            if [[ -n "$RELEASE_PAT" ]]; then
              git remote set-url origin "https://x-access-token:${RELEASE_PAT}@github.com/${{ github.repository }}.git"
            fi
            git push origin main
          fi

          # Create and push tag (used by hatch-vcs for version)
          git tag "v${NEW_VERSION}"
          
          # Use a Personal Access Token if provided to ensure downstream workflow triggers
          if [[ -n "$RELEASE_PAT" ]]; then
            git remote set-url origin "https://x-access-token:${RELEASE_PAT}@github.com/${{ github.repository }}.git"
          fi
          git push origin "v${NEW_VERSION}"

          # Build sdist only (IP protection — never publish wheels)
          rm -rf dist/
          uv build --sdist

          # Verify the tag version made it into the sdist metadata
          tar -xOf dist/*.tar.gz '*/PKG-INFO' | grep "^Version: ${NEW_VERSION}$"

          # IP protection: verify no tables.py in sdist, no wheel built
          ! tar -tvf dist/*.tar.gz | grep '/tables\.py$'
          test $(ls dist/*.whl 2>/dev/null | wc -l) -eq 0

          # Pre-upload smoke test: install from local sdist and run unit tests
          # Skips validation (Puppeteer) tests — those require network + browser
          # and are already covered by the test job on every PR.
          SMOKE_DIR=$(mktemp -d)
          uv venv "$SMOKE_DIR/.venv"
          uv pip install --python "$SMOKE_DIR/.venv/bin/python" "dist/preservationeval-${NEW_VERSION}.tar.gz[test]"
          "$SMOKE_DIR/.venv/bin/python" -m pytest -m "unit and not slow" -v
          rm -rf "$SMOKE_DIR"

          # Validate sdist metadata before upload
          uv run twine check dist/*

          # Upload to PyPI
          UV_PUBLISH_TOKEN=${{ secrets.PYPI_API_TOKEN }} uv publish dist/*.tar.gz

          # Post-release verification: install from PyPI and smoke-test
          # PyPI propagation is variable; retry with backoff instead of fixed sleep
          VERIFY_DIR=$(mktemp -d)
          uv venv "$VERIFY_DIR/.venv"
          for attempt in 1 2 3 4 5; do
            sleep $((attempt * 15))
            if uv pip install --refresh --python "$VERIFY_DIR/.venv/bin/python" "preservationeval==${NEW_VERSION}" 2>/dev/null; then
              "$VERIFY_DIR/.venv/bin/python" -c "from preservationeval import pi, emc, mold; print(f'pi={pi(20,50)} emc={emc(20,50)} mold={mold(20,50)}')"
              break
            fi
            echo "Attempt ${attempt}/5: package not yet available on PyPI, retrying..."
            if [[ $attempt -eq 5 ]]; then
              echo "::warning::Post-release verification failed after 5 attempts — package was published but PyPI propagation is slow"
              rm -rf "$VERIFY_DIR"
              exit 0
            fi
          done
          rm -rf "$VERIFY_DIR"

          echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "🚀 Production release ${NEW_VERSION} published to PyPI successfully"

      - name: Create GitHub Release
        if: steps.release_type.outputs.release_type == 'release-patch' || steps.release_type.outputs.release_type == 'release-minor' || steps.release_type.outputs.release_type == 'release-major'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.build_prod.outputs.new_version }}" \
            --title "Release v${{ steps.build_prod.outputs.new_version }}" \
            --notes "Automated release of preservationeval version ${{ steps.build_prod.outputs.new_version }}. See CHANGELOG.md for details."

      - name: Summary
        run: |
          echo "## 🎯 Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ steps.release_type.outputs.release_type }}" == "release-candidate" ]]; then
            RC_VERSION="${{ steps.build_rc.outputs.rc_version }}"
            echo "- Type: Release Candidate" >> $GITHUB_STEP_SUMMARY
            echo "- Version: \`${RC_VERSION}\`" >> $GITHUB_STEP_SUMMARY
            echo "- Published to: TestPyPI (if token present)" >> $GITHUB_STEP_SUMMARY
          else
            NEW_VERSION="${{ steps.build_prod.outputs.new_version }}"
            echo "- Type: Production Release" >> $GITHUB_STEP_SUMMARY
            echo "- Version: \`${NEW_VERSION}\`" >> $GITHUB_STEP_SUMMARY
            echo "- Tag: \`v${NEW_VERSION}\`" >> $GITHUB_STEP_SUMMARY
            echo "- Published to: PyPI" >> $GITHUB_STEP_SUMMARY
            echo "- GitHub Release: created" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          echo "✅ All tests passed and release completed successfully!" >> $GITHUB_STEP_SUMMARY
